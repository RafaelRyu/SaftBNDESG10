version: '3.8'

services:
  backend:
    build: ./demo
    container_name: saftbndes-backend
    ports:
      - "8080:8080"
    networks:
      - bndes-net

  frontend:
    build: ./frontend
    container_name: saftbndes-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - bndes-net

networks:
  bndes-net:
    driver: bridge