# Configuração do H2 em memória
spring.datasource.url=jdbc:h2:mem:bndesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123456
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Cria automaticamente as tabelas a partir das entidades
spring.jpa.hibernate.ddl-auto=update

# Caminho do arquivo CSV (dentro de resources)
app.csv.file-path=classpath:operacoes.csv